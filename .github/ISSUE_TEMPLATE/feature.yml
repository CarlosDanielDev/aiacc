name: Feature / task
description: A scoped unit of work, mapping to one pull request.
title: "feat(scope): short imperative description"
labels: ["type:feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What this delivers and why. One paragraph.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Bullet list of what is in, and explicitly what is out.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist that, when all ticked, means done.
      value: |
        - [ ]
        - [ ] Tests cover the new behavior
        - [ ] `gofmt` clean, `go vet` clean
    validations:
      required: true
  - type: input
    id: blocked-by
    attributes:
      label: Blocked By
      description: Issue numbers that must close first (dependency edges). Comma-separated, or "none".
      placeholder: "none"
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Target milestone
      placeholder: "v0.2.0"
